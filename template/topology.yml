---
# Template-based topology adapted from sderziotis/btcmp-18-mod3
name: cadmus-topology-template
hosts:
  - name: windows1
    flavor: c2_r4_d40
    base_box:
      image: windows-10-x86_64
      mgmt_user: Administrator
    hidden: false
routers: []
networks:
  - name: mgmt
    cidr: 192.168.56.0/24
    accessible_by_user: true
    hidden: false
wan:
  name: network-1
  cidr: 10.10.10.0/24
net_mappings:
  - host: windows1
    network: mgmt
    ip: 192.168.56.10
router_mappings: []
groups: []

# Notes:
# This is a simplified template topology derived from
# https://github.com/sderziotis/btcmp-18-mod3. Adapt IPs and
# `base_box.image` as needed for your environment.
