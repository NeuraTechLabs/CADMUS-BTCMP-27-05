
- name: Configure srv01 user
  hosts: srv01
  gather_facts: false
  vars:
    ad_domain_name: globalfinancial.local
    ad_admin_password: ChangeMe!
    ad_dc_ip: 10.10.10.3
  pre_tasks:
    - name: Wait for PSRP listener to accept connections
      ansible.builtin.wait_for_connection:
        delay: 0
        sleep: 10
        timeout: 900
  roles:
    - name: ansible-role-user-access-windows
      user_access_username: LocalAdmin
      user_access_password: Password123!
      user_access_rdp: True
      user_access_admin: True
- name: Shared storage — LIO iSCSI block target on the additional disk
  hosts: lin03
  become: true
  vars:
    iscsi_target_iqn: iqn.2026-04.local.globalfinancial:lun0
    iscsi_block_name: lun0
  roles:
    - name: ansible-role-user-access
      user_access_username: localuser
      user_access_password: Password123!
      user_access_sudo: True
  tasks:
    - name: Install targetcli
      ansible.builtin.apt:
        name: targetcli-fb
        state: present
        update_cache: yes
        cache_valid_time: 3600
