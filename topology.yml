---
# Simple sandbox topology definition (schema-compliant)
name: cadmus-topology

hosts:
  - name: windows1
    flavor: c2_r4_d40
    base_box:
      image: windows-10-x86_64
      mgmt_user: Administrator
    hidden: false

routers: []

routers:
  - name: router-1
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
    hidden: false

networks:
  - name: mgmt
    cidr: 192.168.56.0/24
    accessible_by_user: true
    hidden: false

wan:
  name: network-1
  cidr: 10.10.10.0/24

net_mappings:
  - host: windows1
    network: mgmt
    ip: 192.168.56.10

router_mappings:
  - router: router-1
    network: mgmt
    ip: 192.168.56.1
groups: []

# Notes:
# - This file now follows the expected topology schema (uses `hosts`, not `nodes`).
# - Adjust IPs, flavors, and credentials as needed for your environment.
