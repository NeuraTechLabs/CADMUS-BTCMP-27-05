name: cr08
hosts:
  - name: srv01
    flavor: c4_r8_d60
    base_box:
      image: windows-server-2019-x86_64
      mgmt_user: windows
      mgmt_protocol: winrm
    hidden: false
    volumes:
    - size: 60
    - size: 5
  - name: lin03
    flavor: c4_r8_d60
    base_box:
      image: xubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    volumes:
    - size: 40
    - size: 5
    hidden: false
routers:
  - name: router
    flavor: standard.small
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    hidden: false
networks:
  - name: access-switch
    cidr: 10.10.10.0/24
    accessible_by_user: true
    hidden: false
  - name: cluster-switch
    cidr: 10.10.20.0/24
    accessible_by_user: true
    hidden: false
  - name: storage-switch
    cidr: 10.10.30.0/24
    accessible_by_user: true
    hidden: false
wan:
  name: wan
  cidr: 10.10.100.0/24
net_mappings:
  - host: srv01
    network: access-switch
    ip: 10.10.10.4
  - host: srv01
    network: cluster-switch
    ip: 10.10.20.4
  - host: srv01
    network: storage-switch
    ip: 10.10.30.4
  - host: lin03
    network: access-switch
    ip: 10.10.10.8
  - host: lin03
    network: storage-switch
    ip: 10.10.30.3
router_mappings:
  - router: router
    network: access-switch
    ip: 10.10.10.1
  - router: router
    network: cluster-switch
    ip: 10.10.20.1
  - router: router
    network: storage-switch
    ip: 10.10.30.1
groups:
  - name: windows-cluster
    nodes:
      - srv01
  - name: storage-nodes
    nodes:
      - lin03
